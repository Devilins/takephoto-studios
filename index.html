<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Photo — студии в детских центрах Москвы</title>
<meta name="description" content="Адреса фотостудий Take Photo в детских развлекательных центрах Москвы">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F2EA;
    --cream-soft:#FBF9F4;
    --sage:#8CA290;
    --sage-deep:#4A5A46;
    --mauve:#7C6B84;
    --mauve-deep:#5A4C60;
    --ink:#453F3A;
    --muted:#8A8177;
    --line:rgba(124,107,132,0.18);
    --shadow: 0 10px 30px rgba(74,61,58,0.08);
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}

  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 12% -8%, rgba(140,162,144,0.16), transparent 60%),
      radial-gradient(ellipse 800px 500px at 90% 0%, rgba(124,107,132,0.14), transparent 55%),
      var(--cream);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  a{color:inherit;}

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:0 20px 60px;
  }

  /* ---------- HERO ---------- */
  .hero{
    text-align:center;
    padding:52px 0 30px;
  }

  .mark{
    width:92px;
    height:92px;
    border-radius:50%;
    margin:0 auto 18px;
    display:block;
    box-shadow: var(--shadow);
  }

  .wordmark{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(2.1rem, 6vw, 3rem);
    color:var(--mauve-deep);
    margin:0 0 6px;
    letter-spacing:0.01em;
  }

  .tagline{
    font-size:0.92rem;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--sage-deep);
    margin:0 0 26px;
    font-weight:500;
  }

  .sprig{
    display:block;
    width:120px;
    height:auto;
    margin:0 auto 30px;
    opacity:0.85;
  }

  /* ---------- SEARCH ---------- */
  .search-box{
    position:relative;
    max-width:440px;
    margin:0 auto 8px;
  }

  .search-box input{
    width:100%;
    padding:14px 20px 14px 46px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--cream-soft);
    font-family:'Jost', sans-serif;
    font-size:0.98rem;
    color:var(--ink);
    outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }

  .search-box input::placeholder{color:var(--muted);}

  .search-box input:focus{
    border-color:var(--mauve);
    box-shadow:0 0 0 4px rgba(124,107,132,0.12);
  }

  .search-box svg{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    width:17px;
    height:17px;
    stroke:var(--mauve);
    pointer-events:none;
  }

  .count{
    text-align:center;
    font-size:0.82rem;
    color:var(--muted);
    margin:14px 0 34px;
    letter-spacing:0.03em;
  }

  /* ---------- CARDS ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }

  .card{
    background:var(--cream-soft);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px 22px 20px;
    box-shadow:var(--shadow);
    opacity:0;
    transform:translateY(10px);
    animation:rise .5s ease forwards;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  @keyframes rise{
    to{opacity:1; transform:translateY(0);}
  }

  .card .top{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .pin{
    flex:0 0 auto;
    width:34px;
    height:34px;
    border-radius:50%;
    background:rgba(140,162,144,0.16);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .pin svg{width:16px; height:16px; stroke:var(--sage-deep);}

  .mall{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:1.32rem;
    line-height:1.2;
    margin:0;
    color:var(--ink);
  }

  .club-floor{
    font-size:0.78rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--mauve);
    font-weight:500;
    margin-top:2px;
  }

  .address{
    font-size:0.95rem;
    color:var(--muted);
    line-height:1.5;
    margin:0;
    padding-left:46px;
  }

  .route{
    align-self:flex-start;
    margin-left:46px;
    margin-top:2px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    text-decoration:none;
    font-size:0.82rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--sage-deep);
    font-weight:600;
    border-bottom:1px solid transparent;
    transition:border-color .2s ease, color .2s ease;
  }

  .route:hover{
    border-color:var(--sage-deep);
  }

  .route svg{width:13px; height:13px; stroke:currentColor;}

  /* ---------- EMPTY STATE ---------- */
  .empty{
    display:none;
    text-align:center;
    padding:50px 20px;
    color:var(--muted);
    font-size:0.98rem;
  }

  .empty.show{display:block;}

  .grid.hidden{display:none;}

  /* ---------- FOOTER ---------- */
  footer{
    text-align:center;
    margin-top:56px;
  }

  footer .sprig{margin-bottom:14px; width:100px;}

  footer p{
    font-size:0.78rem;
    color:var(--muted);
    letter-spacing:0.04em;
    margin:0;
  }

  /* ---------- ACCESSIBILITY / MOTION ---------- */
  a:focus-visible, input:focus-visible{
    outline:2px solid var(--mauve-deep);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .card{animation:none; opacity:1; transform:none;}
  }
</style>
</head>

    <h1 class="wordmark">Take Photo</h1>
    <p class="tagline">Фотостудии в детских центрах Москвы</p>

    <svg class="sprig" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 20 C 40 5, 60 5, 80 20 C 100 5, 120 5, 150 20" stroke="#8CA290" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M28 20 c -3 -7, 2 -10, 6 -6" stroke="#8CA290" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M46 12 c -2 -7, 4 -9, 7 -4" stroke="#7C6B84" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M112 12 c 2 -7, -4 -9, -7 -4" stroke="#7C6B84" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M132 20 c 3 -7, -2 -10, -6 -6" stroke="#8CA290" stroke-width="1.1" stroke-linecap="round"/>
      <circle cx="80" cy="20" r="2.4" fill="#7C6B84"/>
    </svg>

    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Найдите студию по ТЦ или адресу" autocomplete="off">
    </div>
    <p class="count" id="count"></p>
  </div>

  <div class="grid" id="grid"></div>

  <p class="empty" id="empty">Студий по такому запросу не нашлось.<br>Попробуйте другой район или название ТЦ.</p>

  <footer>
    <svg class="sprig" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 20 C 40 5, 60 5, 80 20 C 100 5, 120 5, 150 20" stroke="#8CA290" stroke-width="1.3" stroke-linecap="round"/>
      <circle cx="80" cy="20" r="2.4" fill="#7C6B84"/>
    </svg>
    <p>Take Photo · студии в детских центрах Москвы</p>
  </footer>

</div>

<script>
/* ============================================================
   СПИСОК СТУДИЙ
   Чтобы добавить новую студию — скопируйте один блок { ... }
   целиком, вставьте запятую после предыдущего и заполните поля:

   mall    — название ТЦ (можно с кавычками-«ёлочками»)
   club    — название детского центра внутри ТЦ (напр. Laserland)
   floor   — этаж, например "3 этаж"
   address — улица, дом (без "Москва" — город добавляется отдельно)

   Ничего в остальном коде трогать не нужно — карточки, поиск
   и счётчик сгенерируются автоматически.
   ============================================================ */

const locations = [
  {
    mall: "ТЦ «На Беговой»",
    club: "Laserland",
    floor: "3 этаж",
    address: "Хорошевское ш., 16, стр. 3"
  },
  {
    mall: "ТЦ «Азовский»",
    club: "Laserland",
    floor: "3 этаж",
    address: "Азовская ул., 24, к. 3"
  }

  /* Добавьте сюда ещё 8 студий по такому же образцу, например:
  ,{
    mall: "ТЦ «Название»",
    club: "Laserland",
    floor: "3 этаж",
    address: "Улица, дом"
  }
  */
];

const grid = document.getElementById('grid');
const emptyEl = document.getElementById('empty');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');

function pinIcon(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21s-7-6.2-7-11.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21z"/>
    <circle cx="12" cy="9.5" r="2.4"/>
  </svg>`;
}

function routeIcon(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
  </svg>`;
}

function render(list){
  grid.innerHTML = list.map((loc, i) => {
    const query = encodeURIComponent(`${loc.address}, Москва, ${loc.mall}`);
    const mapUrl = `https://yandex.ru/maps/?text=${query}`;
    return `
      <div class="card" style="animation-delay:${Math.min(i * 0.06, 0.4)}s">
        <div class="top">
          <div class="pin">${pinIcon()}</div>
          <div>
            <p class="mall">${loc.mall}</p>
            <p class="club-floor">${loc.club} · ${loc.floor}</p>
          </div>
        </div>
        <p class="address">${loc.address}</p>
        <a class="route" href="${mapUrl}" target="_blank" rel="noopener">
          Построить маршрут ${routeIcon()}
        </a>
      </div>
    `;
  }).join('');

  grid.classList.toggle('hidden', list.length === 0);
  emptyEl.classList.toggle('show', list.length === 0);
  countEl.textContent = list.length
    ? `Показано студий: ${list.length} из ${locations.length}`
    : '';
}

function normalize(s){
  return s.toLowerCase().replace(/ё/g, 'е');
}

searchEl.addEventListener('input', () => {
  const q = normalize(searchEl.value.trim());
  if(!q){ render(locations); return; }
  const filtered = locations.filter(loc =>
    normalize(loc.mall + ' ' + loc.address + ' ' + loc.club).includes(q)
  );
  render(filtered);
});

render(locations);
</script>

</body>
</html>
